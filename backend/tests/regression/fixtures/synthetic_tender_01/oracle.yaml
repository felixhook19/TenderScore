# Synthetic Tender 01 — scoring oracle (regression ground truth)
#
# [[HUMAN INPUT NEEDED: Felix to author/review the oracle scores for
# synthetic_tender_01 — this is the regression ground truth and the
# calibration anchor. The scores below are PLACEHOLDERS produced to make the
# regression harness runnable; they encode the intended bidder profiles
# (strong/mid/weak/gate-failer) but have not been reviewed by a domain
# expert.]]
#
# Per bidder, per leaf criterion: the expected recommended score. A list
# means per-pass scores (used to exercise variance routing); a single value
# means every pass converges on it.
oracle:
  strong:
    Q1: 4
    Q2.1: 4
    Q2.2: 4
    Q3.1: 5
    Q3.2: 4
    Q4: 5
    Q5: 4
    Q6: 4
  mid:
    Q1: 3
    Q2.1: 3
    Q2.2: 2
    Q3.1: 2
    Q3.2: 3
    # Deliberate disagreement across passes: variance of 2 bands must
    # escalate to human moderation with no auto-recommended score.
    Q4: [2, 4, 2]
    Q5: 2
    Q6: 3
  weak:
    Q1: 1
    Q2.1: 1
    Q2.2: 2
    Q3.1: 1
    Q3.2: 1
    Q4: 2
    Q5: 2
    Q6: 2
  gate_failer:
    Q1: 2
    Q2.1: 2
    Q2.2: 2
    Q3.1: 2
    Q3.2: 2
    Q4: 2
    Q5: 2
    # Below the gate minimum of 2: fails the Health and Safety gate.
    Q6: 1
