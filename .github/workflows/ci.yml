name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  backend:
    name: Backend (ruff, mypy --strict, pytest)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: tenderscore
          POSTGRES_PASSWORD: tenderscore
          POSTGRES_DB: tenderscore
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U tenderscore"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"
      - name: Sync dependencies
        run: uv sync --frozen
      - name: ruff
        run: uv run ruff check .
      - name: mypy --strict
        run: uv run mypy
      - name: pytest (with the legally load-bearing coverage floor)
        run: uv run pytest --cov=app.audit --cov-report=term --cov-fail-under=85

  frontend:
    name: Frontend (tsc --noEmit, vitest + axe-core)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: tsc --noEmit
        run: npx tsc --noEmit
      - name: vitest (includes axe-core accessibility checks)
        run: npm test
